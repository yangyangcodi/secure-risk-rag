<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Risk Intelligence — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.2;
    }

    .logo-text span {
      font-size: 12px;
      color: #64748b;
      font-weight: 400;
    }

    .welcome {
      margin-bottom: 28px;
    }

    .welcome h2 {
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .welcome p {
      font-size: 14px;
      color: #64748b;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    input.error {
      border-color: #ef4444;
      background: #fff5f5;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
    }

    .btn:hover { opacity: 0.92; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn.loading .spinner { display: block; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    .error-msg {
      display: none;
      background: #fee2e2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
    }

    .error-msg.show { display: block; }

    .hint {
      margin-top: 24px;
      padding: 12px 14px;
      background: #f1f5f9;
      border-radius: 8px;
      font-size: 12px;
      color: #64748b;
    }

    .hint strong { color: #374151; }

    .api-link {
      margin-top: 16px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
    }

    .api-link a { color: #3b82f6; text-decoration: none; }
    .api-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛡</div>
      <div class="logo-text">
        <h1>Risk Intelligence</h1>
        <span>Secure RAG Platform</span>
      </div>
    </div>

    <div class="welcome">
      <h2>Sign in</h2>
      <p>Enter your credentials to access the platform</p>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
      </div>

      <button class="btn" type="submit" id="loginBtn">
        Sign in
        <div class="spinner"></div>
      </button>

      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="hint">
      <strong>Demo credentials:</strong> username <code>analyst</code> · password <code>riskpass123</code>
    </div>

    <div class="api-link">
      Prefer the API? <a href="/docs" target="_blank">Open Swagger UI</a>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("loginBtn");
      const errorMsg = document.getElementById("errorMsg");
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      btn.disabled = true;
      btn.classList.add("loading");
      btn.childNodes[0].textContent = "Signing in... ";
      errorMsg.classList.remove("show");

      try {
        const resp = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });

        const data = await resp.json();

        if (!resp.ok) {
          throw new Error(data.detail || "Login failed");
        }

        // Store token and redirect to dashboard
        sessionStorage.setItem("token", data.access_token);
        sessionStorage.setItem("username", username);
        window.location.href = "/dashboard";

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.add("show");
        document.getElementById("password").classList.add("error");
      } finally {
        btn.disabled = false;
        btn.classList.remove("loading");
        btn.childNodes[0].textContent = "Sign in ";
      }
    }

    // Clear error on input change
    document.getElementById("password").addEventListener("input", () => {
      document.getElementById("password").classList.remove("error");
      document.getElementById("errorMsg").classList.remove("show");
    });

    // If already logged in, redirect
    if (sessionStorage.getItem("token")) {
      window.location.href = "/dashboard";
    }
  </script>
</body>
</html>
